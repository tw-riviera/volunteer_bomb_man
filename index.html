<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>義工炸彈人</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#2B3A67;--red:#FF4136;--blue:#0074D9;--yellow:#FFDC00;--green:#2ECC40;--orange:#FF851B;--purple:#6C5CE7}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif}
body{background:var(--bg)}

/* ===== START SCREEN ===== */
.start-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at center,#3d4f85 0%,#2B3A67 70%);animation:fadeIn .6s ease-out}
.start-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:2vh}
.start-bomber{width:clamp(120px,22vh,220px);height:auto;filter:drop-shadow(0 8px 30px rgba(0,0,0,.6));animation:floatB 2s ease-in-out infinite}
@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.game-title{font-size:clamp(3rem,8vw,6rem);font-weight:900;color:#fff;text-shadow:-4px -4px 0 #000,4px -4px 0 #000,-4px 4px 0 #000,4px 4px 0 #000,0 8px 0 #000,0 10px 30px rgba(0,0,0,.5);letter-spacing:.08em}
.game-subtitle{font-size:clamp(1.2rem,2.5vw,1.8rem);color:var(--orange);font-weight:700;text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000}
.btn{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;padding:1.5vh 5vw;border:4px solid #000;border-radius:16px;cursor:pointer;transition:all .15s;font-family:inherit;text-shadow:0 2px 0 rgba(0,0,0,.3);box-shadow:0 6px 0 #000,0 8px 20px rgba(0,0,0,.3);letter-spacing:.05em;color:#fff}
.btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 9px 0 #000,0 12px 30px rgba(0,0,0,.4)}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #000}
.btn-start{background:linear-gradient(180deg,var(--orange) 0%,#E67E22 100%);margin-top:3vh}

/* ===== GAME SCREEN ===== */
.game-screen{display:flex;flex-direction:column;height:100vh}
.top-hud{display:flex;align-items:center;justify-content:space-between;padding:1.2vh 2vw;background:rgba(0,0,0,.4);border-bottom:3px solid rgba(255,255,255,.2);min-height:7vh;z-index:10}
.round-badge{background:linear-gradient(180deg,var(--orange) 0%,#E67E22 100%);color:#fff;font-size:clamp(1rem,2vw,1.5rem);font-weight:900;padding:.8vh 2vw;border-radius:12px;border:3px solid #000;text-shadow:0 2px 0 rgba(0,0,0,.3);box-shadow:0 4px 0 #000}

/* Zones */
.board{flex:1;position:relative}
.zones{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;width:100%;height:100%;gap:6px;padding:6px}
.zone{position:relative;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2vh 2vw;border:4px solid rgba(0,0,0,.3);overflow:hidden;gap:2vh;transition:all .3s ease}
.zone-label{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:900;color:#fff;text-shadow:-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000,3px 3px 0 #000,0 4px 10px rgba(0,0,0,.5);line-height:1}
.zone-text{font-size:clamp(1.4rem,2.8vw,2.4rem);font-weight:700;color:#fff;text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000,0 3px 8px rgba(0,0,0,.5);text-align:center;line-height:1.5;max-width:90%;padding:1.5vh 2vw;background:rgba(0,0,0,.15);border-radius:12px}

/* Cross lines */
.ch{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;display:flex;align-items:center;justify-content:center}
.cv{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;display:flex;align-items:center;justify-content:center}
.clh{width:100%;height:8px;background:linear-gradient(90deg,transparent 0%,#C0C0C0 5%,#E8E8E8 50%,#C0C0C0 95%,transparent 100%);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.clv{width:8px;height:100%;background:linear-gradient(180deg,transparent 0%,#C0C0C0 5%,#E8E8E8 50%,#C0C0C0 95%,transparent 100%);box-shadow:2px 0 8px rgba(0,0,0,.5)}

/* Reveal overlay */
.reveal-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vh;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);border-radius:16px;animation:revealFade .4s ease-out;z-index:3}
@keyframes revealFade{from{opacity:0}to{opacity:1}}
.result-icon{width:clamp(80px,12vw,140px);height:clamp(80px,12vw,140px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(3rem,7vw,5rem);font-weight:900;border:5px solid #000;animation:pop .4s ease-out}
.result-icon.correct{background:#2ECC40;color:#fff}
.result-icon.wrong{background:#FF4136;color:#fff;animation:pop .4s ease-out,shakeW .5s ease-out .4s}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shakeW{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.result-exp{font-size:clamp(1rem,2vw,1.6rem);font-weight:700;color:#fff;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;text-align:center;padding:.8vh 2vw;background:rgba(0,0,0,.4);border-radius:10px;max-width:85%;line-height:1.4}

/* ===== BOTTOM BAR ===== */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:1vh 2vw;background:rgba(0,0,0,.4);border-top:2px solid rgba(255,255,255,.15);min-height:8vh;z-index:10;gap:2vw}
.countdown-area{display:flex;align-items:center;gap:1vw}
.btn-countdown{font-size:clamp(1.2rem,2.5vw,1.8rem);font-weight:900;padding:1vh 4vw;border:3px solid #000;border-radius:12px;cursor:pointer;transition:all .15s;font-family:inherit;background:linear-gradient(180deg,#00B894 0%,#00A383 100%);color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.3);box-shadow:0 4px 0 #000,0 6px 15px rgba(0,0,0,.3)}
.btn-countdown:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 6px 0 #000,0 10px 25px rgba(0,0,0,.4)}
.btn-countdown:active{transform:translateY(3px);box-shadow:0 1px 0 #000}
.btn-countdown:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:0 2px 0 #000}
.count-num{font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:900;color:var(--yellow);text-shadow:-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000,3px 3px 0 #000,0 4px 15px rgba(255,220,0,.4);animation:pulse 1s ease-in-out infinite}
.count-num.urgent{color:#FF4136;text-shadow:-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000,3px 3px 0 #000,0 4px 15px rgba(255,65,54,.5);animation:pulseF .5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes pulseF{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.count-unit{font-size:clamp(1rem,2vw,1.5rem);font-weight:700;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5);margin-left:.3vw}

/* Reveal button - bottom right */
.reveal-area{display:flex;align-items:center;justify-content:flex-end}
.btn-reveal{font-size:clamp(1.3rem,2.5vw,1.8rem);font-weight:900;padding:1vh 5vw;border:3px solid #000;border-radius:12px;cursor:pointer;transition:all .15s;font-family:inherit;background:linear-gradient(180deg,#FF4136 0%,#E03030 100%);color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.3);box-shadow:0 4px 0 #000,0 6px 15px rgba(0,0,0,.3)}
.btn-reveal:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 6px 0 #000,0 10px 25px rgba(0,0,0,.4)}
.btn-reveal:active{transform:translateY(3px);box-shadow:0 1px 0 #000}
.reveal-badge{background:linear-gradient(180deg,#2ECC40 0%,#27AE60 100%);color:#fff;font-size:clamp(1.3rem,2.5vw,1.8rem);font-weight:900;padding:1vh 4vw;border-radius:12px;border:3px solid #000;text-shadow:0 2px 0 rgba(0,0,0,.3);box-shadow:0 4px 0 #000;animation:fadeIn .3s ease-out}

/* Next round button */
.next-area{display:flex;justify-content:center;padding:1.5vh;background:rgba(0,0,0,.3);border-top:2px solid rgba(255,255,255,.15)}
.btn-next{background:linear-gradient(180deg,var(--purple) 0%,#5B4BC4 100%);font-size:clamp(1.3rem,2.5vw,1.8rem);padding:1.2vh 5vw}

/* ===== LEADERBOARD ===== */
/* Responsive */
@media(max-width:768px){
  .zone-text{font-size:clamp(1rem,2.5vw,1.3rem)}
  .zones{gap:4px;padding:4px}
  .btn{font-size:clamp(1.2rem,2.5vw,1.6rem);padding:1.2vh 4vw}
}
@media(max-height:600px){
  .top-hud{min-height:6vh;padding:.8vh 2vw}
  .bottom-bar{min-height:6vh}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.5)}
</style>
</head>

<script>
// ==========================================

const QUESTIONS=[
{id:1,zoneA:"老師叫你擦黑板",zoneB:"幫媽媽洗碗因為想攞零用錢",zoneC:"放學後主動幫老師整理圖書角",zoneD:"同學唔識做數學，你主動教佢",correct:["C","D"],exp:{A:"老師叫你做 → 非義工",B:"為零用錢 → 非義工",C:"主動幫人，冇錢收 → 義工",D:"自發教同學 → 義工"}},
{id:2,zoneA:"學校強制要你去社區清潔",zoneB:"週末去老人院陪長者下棋、傾偈",zoneC:"幫鄰居伯伯倒垃圾，冇收錢",zoneD:"爸爸媽媽叫你去便利店買醬油",correct:["B","C"],exp:{A:"強制參加 → 非義工",B:"自發探訪長者 → 義工",C:"主動幫鄰居 → 義工",D:"幫家人 → 非義工"}},

{id:5,zoneA:"學校活動中幫手派傳單，冇人工",zoneB:"朋友生日會幫手佈置場地",zoneC:"學校開放日自願做導賞員帶家長參觀",zoneD:"出席率唔夠，被迫參加課外活動",correct:["A","C"],exp:{A:"無償幫手 → 義工",B:"幫朋友佈置 → 非義工",C:"自願做導賞 → 義工",D:"被迫參加 → 非義工"}},

// ==========================================
//  AUDIO (Web Audio API - fully offline)
// ==========================================
let audioCtx=null;
function ensureCtx(){if(!audioCtx){const C=window.AudioContext||window.webkitAudioContext;if(C)audioCtx=new C()}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();return audioCtx}

function playTone(freq,dur,type='sine',delay=0,vol=0.3){
  try{const c=ensureCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(freq,c.currentTime+delay);g.gain.setValueAtTime(vol,c.currentTime+delay);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+dur);o.connect(g);g.connect(c.destination);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur)}catch(e){}
}

function playExplosion(){
  try{
    const c=ensureCtx();if(!c)return;
    // White noise rumble
    const bs=c.sampleRate*1.2,b=c.createBuffer(1,bs,c.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<bs;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,2)}
    const ns=c.createBufferSource();ns.buffer=b;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(800,c.currentTime);f.frequency.exponentialRampToValueAtTime(100,c.currentTime+.5);
    const g=c.createGain();g.gain.setValueAtTime(0.6,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+1.2);
    ns.connect(f);f.connect(g);g.connect(c.destination);ns.start(c.currentTime);
    // Low thump
    const t=c.createOscillator();t.type='sine';t.frequency.setValueAtTime(150,c.currentTime);t.frequency.exponentialRampToValueAtTime(30,c.currentTime+.3);
    const tg=c.createGain();tg.gain.setValueAtTime(0.8,c.currentTime);tg.gain.exponentialRampToValueAtTime(0.001,c.currentTime+.4);
    t.connect(tg);tg.connect(c.destination);t.start(c.currentTime);t.stop(c.currentTime+.4);
    // Crackle
    const cr=c.createOscillator();cr.type='sawtooth';cr.frequency.setValueAtTime(200,c.currentTime);cr.frequency.exponentialRampToValueAtTime(50,c.currentTime+.15);
    const cg=c.createGain();cg.gain.setValueAtTime(0.4,c.currentTime);cg.gain.exponentialRampToValueAtTime(0.001,c.currentTime+.15);
    cr.connect(cg);cg.connect(c.destination);cr.start(c.currentTime);cr.stop(c.currentTime+.15);
  }catch(e){}
}

function playTick(){playTone(1000,.08,'square',0,.15)}
function playFinalTick(){playTone(1200,.15,'square',0,.25)}
function playGo(){playTone(523.25,.1,'sine',0,.3);playTone(659.25,.1,'sine',.1,.3);playTone(783.99,.1,'sine',.2,.3);playTone(1046.50,.4,'triangle',.3,.35)}
function playNext(){playTone(698.46,.12,'sine',0,.2);playTone(880,.12,'sine',.1,.2);playTone(1046.50,.25,'sine',.2,.25)}
function playStartS(){playTone(392,.15,'sine',0,.2);playTone(523.25,.15,'sine',.12,.22);playTone(659.25,.15,'sine',.24,.24);playTone(783.99,.4,'sine',.36,.28)}

// ==========================================
//  GAME STATE
// ==========================================
let phase='start',currentRound=0;
let countdownActive=false,countdownVal=10,countdownTimer=null;
let audioReady=false;

function ensureAudio(){if(!audioReady){audioReady=true;ensureCtx()}}

// ==========================================
//  RENDER
// ==========================================
const ZC={A:'#FF4136',B:'#0074D9',C:'#FFDC00',D:'#2ECC40'};
const ZL={A:'A 區',B:'B 區',C:'C 區',D:'D 區'};

function isCorrect(z){return questions[currentRound]?.correct.includes(z)||false}

function render(){
  const app=document.getElementById('app');
  if(phase==='start'){
    app.innerHTML=`<div class="start-screen"><div class="start-content">
      <img src="${BOMBER_IMG}" alt="炸彈人" class="start-bomber">
      <h1 class="game-title">義工炸彈人</h1>
      <p class="game-subtitle">16人團體問答遊戲</p>
      <button class="btn btn-start" onclick="startGame()">開始遊戲</button>
    </div></div>`;
    return;
  }
  const q=questions[currentRound];
  const reveal=phase==='reveal';
  const zt={A:q.zoneA,B:q.zoneB,C:q.zoneC,D:q.zoneD};

  let html=`<div class="game-screen">
    <div class="top-hud"><div class="hud-left"><div class="round-badge">ROUND ${currentRound+1}/32</div></div></div>
    <div class="board">
      <div class="zones">`;

  for(const z of ['A','B','C','D']){
    const correct=isCorrect(z);
    html+=`<div class="zone" style="background-color:${ZC[z]}">
      <div class="zone-label">${ZL[z]}</div>
      <div class="zone-text">${zt[z]}</div>
      ${reveal?`<div class="reveal-overlay"><div class="result-icon ${correct?'correct':'wrong'}">${correct?'✓':'✗'}</div><div class="result-exp">${q.exp[z]}</div></div>`:''}
    </div>`;
  }

  html+=`</div>
    <div class="ch"><div class="clh"></div></div>
    <div class="cv"><div class="clv"></div></div>
  </div>`;

  // Bottom bar
  html+=`<div class="bottom-bar">
    <div class="countdown-area">`;
  if(countdownActive&&countdownVal>0){
    html+=`<span class="count-num ${countdownVal<=3?'urgent':''}">${countdownVal}</span><span class="count-unit">秒</span>`;
  }else{
    html+=`<button class="btn-countdown" onclick="startCountdown()" ${reveal?'disabled':''}>⏱ 開始倒數</button>`;
  }
  html+=`</div>
    <div class="reveal-area">
      ${reveal?'<div class="reveal-badge">開估！</div>':'<button class="btn-reveal" onclick="doReveal()">開估</button>'}
    </div>
  </div>`;

  // Next round + replay buttons
  if(reveal){
    html+=`<div class="next-area"><button class="btn btn-replay" onclick="replayRound()">🔁 重玩本題</button><button class="btn btn-next" onclick="nextRound()">下一回合</button></div>`;
  }

  html+=`</div>`;
  app.innerHTML=html;
}

// ==========================================
//  GAME ACTIONS
// ==========================================
function startGame(){ensureAudio();playStartS();phase='question';currentRound=0;render()}
function replayRound(){ensureAudio();playNext();phase='question';clearCountdown();render()}
function doReveal(){ensureAudio();playExplosion();phase='reveal';clearCountdown();render()}
function nextRound(){ensureAudio();playNext();if(currentRound>=31){currentRound=0;phase='start'}else{currentRound++;phase='question';clearCountdown()}render()}
function resetGame(){ensureAudio();phase='start';currentRound=0;clearCountdown();render()}

function clearCountdown(){if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null}countdownActive=false;countdownVal=10}

function startCountdown(){
  if(phase!=='question'||countdownActive)return;
  ensureAudio();playStartS();
  countdownActive=true;countdownVal=10;render();
  countdownTimer=setInterval(()=>{
    countdownVal--;
    if(countdownVal<=0){
      clearInterval(countdownTimer);countdownTimer=null;
      playGo();countdownActive=false;render();
    }else{
      if(countdownVal<=3)playFinalTick();else playTick();
      render();
    }
  },1000);
}

// Initial render
render();
</script>
